<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFeed - AI智能信息聚合</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-rss"></i>
                <span>SmartFeed</span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="all">
                    <i class="fas fa-inbox"></i>
                    <span>全部文章</span>
                    <span class="badge" id="unread-count">0</span>
                </a>
                <a href="#" class="nav-item" data-view="unread">
                    <i class="fas fa-envelope"></i>
                    <span>未读</span>
                </a>
                <a href="#" class="nav-item" data-view="starred">
                    <i class="fas fa-star"></i>
                    <span>收藏</span>
                </a>
            </nav>

            <div class="feeds-section">
                <div class="section-header">
                    <span>订阅源</span>
                    <button class="btn-icon" id="btn-add-feed" title="添加订阅">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <ul class="feeds-list" id="feeds-list">
                    <!-- 动态加载 -->
                </ul>
            </div>

            <div class="tags-section">
                <div class="section-header">
                    <span>标签</span>
                    <button class="btn-icon" id="btn-add-tag" title="添加标签">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <ul class="tags-list" id="tags-list">
                    <!-- 动态加载 -->
                </ul>
            </div>

            <div class="sidebar-footer">
                <button class="btn-icon" id="btn-knowledge-graph" title="知识图谱">
                    <i class="fas fa-project-diagram"></i>
                </button>
                <button class="btn-icon" id="btn-settings" title="设置">
                    <i class="fas fa-cog"></i>
                </button>
                <button class="btn-icon" id="btn-refresh" title="刷新">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部工具栏 -->
            <header class="toolbar">
                <div class="toolbar-left">
                    <h1 class="page-title" id="page-title">全部文章</h1>
                    <span class="stats" id="stats-text"></span>
                </div>
                <div class="toolbar-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="搜索文章...">
                    </div>
                    <button class="btn btn-secondary" id="btn-mark-all-read">
                        <i class="fas fa-check-double"></i>
                        全部已读
                    </button>
                </div>
            </header>

            <!-- 文章列表 -->
            <div class="content-area">
                <div class="items-list" id="items-list">
                    <!-- 动态加载 -->
                </div>

                <!-- 文章详情 -->
                <div class="item-detail hidden" id="item-detail">
                    <div class="detail-header">
                        <button class="btn-icon" id="btn-close-detail">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="detail-actions">
                            <button class="btn-icon" id="btn-star-detail" title="收藏">
                                <i class="far fa-star"></i>
                            </button>
                            <button class="btn-icon" id="btn-open-external" title="在浏览器中打开">
                                <i class="fas fa-external-link-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="detail-content" id="detail-content">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加Feed弹窗 -->
    <div class="modal hidden" id="modal-add-feed">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加订阅源</h3>
                <button class="btn-icon btn-close-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Feed URL</label>
                    <input type="url" id="feed-url" placeholder="https://example.com/feed.xml">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <input type="text" id="feed-category" placeholder="默认">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-close-modal">取消</button>
                <button class="btn btn-primary" id="btn-confirm-add-feed">添加</button>
            </div>
        </div>
    </div>

    <!-- 添加标签弹窗 -->
    <div class="modal hidden" id="modal-add-tag">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加标签</h3>
                <button class="btn-icon btn-close-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标签名称</label>
                    <input type="text" id="tag-name" placeholder="技术">
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <input type="color" id="tag-color" value="#3498db">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-close-modal">取消</button>
                <button class="btn btn-primary" id="btn-confirm-add-tag">添加</button>
            </div>
        </div>
    </div>

    <!-- 知识图谱弹窗 -->
    <div class="modal modal-large hidden" id="modal-knowledge-graph">
        <div class="modal-content">
            <div class="modal-header">
                <h3>知识图谱</h3>
                <button class="btn-icon btn-close-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="knowledge-graph-container"></div>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
